<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Comet Bay Bowling Club – Display</title>

  <!-- FIX: Load CSS from Express server -->
  <link rel="stylesheet" href="http://localhost:3000/admin/style.css">
</head>

<body class="display-body">
  <div class="background-layer">
    <div id="backgroundImage" class="background-image"></div>
    <div id="backgroundOverlay" class="background-overlay"></div>
  </div>

  <header class="header">
    <div class="club-name">Comet Bay Bowling Club</div>
    <div class="club-logo">
      <img id="clubLogo" src="" alt="Club Logo">
    </div>
  </header>

  <main class="main">
    <section class="ladder-section">
      <h2>Ladder</h2>
      <div id="ladderContainer">
        <div style="opacity:0.7;font-size:0.9rem;">Ladder display not yet implemented in this version.</div>
      </div>
    </section>

    <section class="results-section">
      <h2>Recent Results</h2>
      <div id="resultsContainer">
        <div style="opacity:0.7;font-size:0.9rem;">Results display not yet implemented in this version.</div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="sponsors-carousel" id="sponsorsCarousel"></div>
  </footer>

  <script src="display.js"></script>
</body>
</html>
