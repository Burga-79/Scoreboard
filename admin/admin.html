<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scoreboard Admin</title>
  <link rel="stylesheet" href="http://localhost:3000/admin/style.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="sidebar">
      <h1 class="sidebar-title">Scoreboard</h1>
      <nav>
        <button class="nav-btn" data-section="club">Club Logo</button>
        <button class="nav-btn" data-section="sponsors">Sponsors</button>
        <button class="nav-btn" data-section="backgrounds">Backgrounds</button>
        <button class="nav-btn" data-section="results">Results</button>
      </nav>
      <button id="saveAll" class="primary-btn">Save & Refresh Display</button>
    </aside>

    <main class="content">
      <!-- CLUB -->
      <section id="section-club" class="section active">
        <h2>Club Logo</h2>
        <input type="file" id="uploadClubLogo">
        <div id="clubLogoPreview" class="preview-box"></div>
      </section>

      <!-- SPONSORS -->
      <section id="section-sponsors" class="section">
        <h2>Sponsors</h2>
        <input type="file" id="uploadSponsor">
        <div id="sponsorList" class="scroll-strip"></div>
      </section>

      <!-- BACKGROUNDS -->
      <section id="section-backgrounds" class="section">
        <h2>Backgrounds</h2>
        <input type="file" id="uploadBackground">
        <div id="backgroundList" class="scroll-strip"></div>

        <div class="field-row">
          <label>Mode</label>
          <select id="bgMode">
            <option value="single">Single</option>
            <option value="sequential">Sequential</option>
            <option value="random">Random</option>
          </select>
        </div>

        <div class="field-row">
          <label>Interval (seconds)</label>
          <input type="number" id="bgInterval" min="5" value="30">
        </div>

        <div class="field-row">
          <label>Overlay (0–1)</label>
          <input type="number" id="bgOverlay" step="0.1" min="0" max="1" value="0.4">
        </div>
      </section>

      <!-- RESULTS -->
      <section id="section-results" class="section">
        <h2>Results</h2>

        <div class="result-row">
          <input type="text" class="team-name" id="teamA" placeholder="Team A">
          <input type="number" class="score-input" id="scoreA" placeholder="0">
        </div>

        <div class="result-row">
          <input type="text" class="team-name" id="teamB" placeholder="Team B">
          <input type="number" class="score-input" id="scoreB" placeholder="0">
        </div>

        <button id="saveResults" class="primary-btn">Save Results</button>
      </section>
    </main>
  </div>

  <script src="http://localhost:3000/admin/admin.js"></script>
</body>
</html>
