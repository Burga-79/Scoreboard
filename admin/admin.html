<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scoreboard Admin</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="admin-body">

  <h1>Scoreboard Admin</h1>

  <!-- CLUB LOGO -->
  <section class="admin-section">
    <h2>Club Logo</h2>
    <input type="file" id="uploadClubLogo">
    <div id="clubLogoPreview"></div>
  </section>

  <!-- SPONSORS -->
  <section class="admin-section">
    <h2>Sponsors</h2>
    <input type="file" id="uploadSponsor">
    <div id="sponsorList" class="scroll-strip"></div>
  </section>

  <!-- BACKGROUNDS -->
  <section class="admin-section">
    <h2>Backgrounds</h2>
    <input type="file" id="uploadBackground">
    <div id="backgroundList" class="scroll-strip"></div>

    <label>Mode:</label>
    <select id="bgMode">
      <option value="single">Single</option>
      <option value="sequential">Sequential</option>
      <option value="random">Random</option>
    </select>

    <label>Interval (seconds):</label>
    <input type="number" id="bgInterval" min="5" value="30">

    <label>Overlay (0–1):</label>
    <input type="number" id="bgOverlay" step="0.1" min="0" max="1" value="0.4">
  </section>

  <!-- RESULTS -->
  <section class="admin-section">
    <h2>Results</h2>

    <div class="result-row">
      <input type="text" class="team-name" id="teamA" placeholder="Team A">
      <input type="number" class="score-input" id="scoreA" placeholder="0">
    </div>

    <div class="result-row">
      <input type="text" class="team-name" id="teamB" placeholder="Team B">
      <input type="number" class="score-input" id="scoreB" placeholder="0">
    </div>

    <button id="saveResults">Save Results</button>
  </section>

  <button id="saveAll">Save All Settings</button>

  <script src="admin.js"></script>
</body>
</html>
